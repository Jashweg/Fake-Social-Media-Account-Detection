<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Fake Account Detection</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <nav class="navbar">
        <a href="https://www.linkedin.com/in/jashweg-raval-292897282?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="nav-link" style="text-align: right;">
            <span style="display: block;">Made by Jashweg G Raval</span>
            <span style="display: block; font-size: 0.75rem; font-weight: 400; opacity: 0.7; margin-top: 2px;">Click to connect on LinkedIn</span>
        </a>
    </nav>
    
    <div class="container">
        <header>
            <h1>AI Fake Account Detector</h1>
            <p>Enter an Instagram account's details to analyze its authenticity.</p>
        </header>

        <form id="prediction-form">
            <div class="form-grid">
                <!-- Profile Pic -->
                <div class="form-group">
                    <label for="profile_pic">Has Profile Pic?</label>
                    <select id="profile_pic" name="profile_pic">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                
                <!-- Private -->
                <div class="form-group">
                    <label for="private">Is Private?</label>
                    <select id="private" name="private">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <!-- External URL -->
                <div class="form-group">
                    <label for="external_url">Has External URL?</label>
                    <select id="external_url" name="external_url">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <!-- Name == Username -->
                <div class="form-group">
                    <label for="name_username">Name matches Username?</label>
                    <select id="name_username" name="name_username">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <!-- Nums/Length Username -->
                <div class="form-group">
                    <label for="nums_length_username">Numbers / Length (Username)</label>
                    <input type="number" step="0.01" id="nums_length_username" name="nums_length_username" value="0.0" required>
                </div>

                <!-- Fullname Words -->
                <div class="form-group">
                    <label for="fullname_words">Fullname Words</label>
                    <input type="number" id="fullname_words" name="fullname_words" value="0" required>
                </div>

                <!-- Nums/Length Fullname -->
                <div class="form-group">
                    <label for="nums_length_fullname">Numbers / Length (Fullname)</label>
                    <input type="number" step="0.01" id="nums_length_fullname" name="nums_length_fullname" value="0.0" required>
                </div>

                <!-- Description Length -->
                <div class="form-group">
                    <label for="description_length">Description Length</label>
                    <input type="number" id="description_length" name="description_length" value="0" required>
                </div>

                <!-- Posts -->
                <div class="form-group">
                    <label for="posts">Number of Posts</label>
                    <input type="number" id="posts" name="posts" value="0" required>
                </div>

                <!-- Followers -->
                <div class="form-group">
                    <label for="followers">Followers</label>
                    <input type="number" id="followers" name="followers" value="0" required>
                </div>

                <!-- Follows -->
                <div class="form-group">
                    <label for="follows">Follows (Following)</label>
                    <input type="number" id="follows" name="follows" value="0" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span>Analyze Account</span>
                <div class="loader hidden"></div>
            </button>
        </form>

        <div id="result-container" class="hidden">
            <h2>Analysis Result</h2>
            <div id="result-box" class="result-box">
                <span id="result-text"></span>
                <div id="confidence-text" style="font-size: 1.1rem; margin-top: 10px; font-weight: normal; opacity: 0.9;"></div>
            </div>
            <button id="reset-btn" class="reset-btn">Analyze Another</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
